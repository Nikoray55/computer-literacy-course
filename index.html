Kompyuter ikki asosiy toifadan iborat: **Hardware** (jismoniy qismlar) va **Software** (dasturlar).

### \u{1F527} Asosiy Hardware qismlari:

**Protsessor (CPU \u{2014} Central Processing Unit)**
Kompyuterning "miyasi". Barcha hisob-kitoblarni bajaradi.
- Intel Core i3/i5/i7/i9
- AMD Ryzen 3/5/7/9
- Tezligi GHz bilan o'lchanadi (masalan: 3.5 GHz)

**Operativ xotira (RAM \u{2014} Random Access Memory)**
Vaqtinchalik ma'lumotlar saqlanadi. Kompyuter o'chirilganda o'chadi.
- 4 GB \u{2014} minimal
- 8 GB \u{2014} standart
- 16-32 GB \u{2014} professional

**Saqlash qurilmalari:**
- **HDD** (Hard Disk Drive) \u{2014} magnit disk, sekin lekin arzon, 1-4 TB
- **SSD** (Solid State Drive) \u{2014} tez, ishonchli, 256 GB - 2 TB

### Asosiy tushunchalar:

**IP Manzil (Internet Protocol Address)**
Har bir qurilmaning tarmoqdagi noyob manzili.

- IPv6: \`2001:0db8:85a3::8a2e:0370:7334\` (yangi standart)
- Public IP \u{2014} internet uchun (provayderingiz beradi)
- Private IP \u{2014} mahalliy tarmoq uchun (192.168.x.x)

**DNS (Domain Name System)**

n:"SecuritySimulation",content:{uz:`## Kiberxavfsizlik

### \u{1F510} Kuchli parol yaratish:

**ZAIF parollar (HECH QACHON ishlatmang):**
- \`123456\`, \`password\`, \`qwerty\`, \`111111\`
- Tug'ilgan kun: \`19901515\`
- Ism: \`ali123\`

**KUCHLI parol qoidalari:**
- \u{2705} Kamida **12 ta belgi**
- \u{2705} **Katta harf** (A-Z)
- \u{2705} **Kichik harf** (a-z)
- \u{2705} **Raqam** (0-9)
- \u{2705} **Maxsus belgi** (!@#$%^&*)
- \u{2705} Har sayt uchun **alohida parol**

**Yaxshi parol misollari:**
- \`MyC@t_L0ves_F!sh2024\`
- \`Tr0mb0n&Jazz!Music99\`

**Parol menejerlari:** Bitwarden (bepul), 1Password, LastPass

### \u{1F6E1}\u{FE0F} Ikki bosqichli tasdiqlash (2FA):
1. Parol kiritasiz
2. Telefoningizga kod keladi (SMS yoki app)
3. Ikkalasini kiritsangiz kirasiz

**2FA dasturlari:** Google Authenticator, Authy

### \u{1F3A3} Fishing (Phishing) hujumlarini tanish:

**Phishing belgilari:**
- \u{274C} Noma'lum jo'natuvchi
- \u{274C} Shoshiltirilish: "Akkauntingiz o'chiriladi!"
- \u{274C} Noto'g'ri URL: \`g00gle.com\`, \`paypa1.com\`
- \u{274C} Shaxsiy ma'lumot so'rash
- \u{274C} Grammatik xatolar

**Haqiqiy tashkilotlar HECH QACHON:**
- Parolingizni so'ramaydi
- SMS orqali bank ma'lumotlarini so'ramaydi

### \u{1F9A0} Zararli dasturlar (Malware):
- **Virus** \u{2014} o'z-o'zini ko'paytiradi
- **Trojan** \u{2014} foydali dastur ko'rinishida yashirinadi
- **Ransomware** \u{2014} fayllarni bloklaydi, pul talab qiladi
- **Spyware** \u{2014} ma'lumotlaringizni o'g'irlaydi

**Himoya:**
- Windows Defender (bepul, yetarli)
- Malwarebytes (qo'shimcha skan)
- Noma'lum saytlardan yuklab olmang`,ru:`## \u{41A}\u{438}\u{431}\u{435}\u{440}\u{431}\u{435}\u{437}\u{43E}\u{43F}\u{430}\u{441}\u{43D}\u{43E}\u{441}\u{442}\u{44C}

- \u{274C} \u{417}\u{430}\u{43F}\u{440}\u{43E}\u{441} \u{43B}\u{438}\u{447}\u{43D}\u{44B}\u{445} \u{434}\u{430}\u{43D}\u{43D}\u{44B}\u{445}`,en:`## Cybersecurity

### \u{1F510} Creating Strong Passwords:
**WEAK (never use):** 123456, password, qwerty, birthdate

**Strong Password Rules:**
- \u{2705} At least **12 characters**
- \u{2705} **Uppercase** letters (A-Z)
- \u{2705} **Lowercase** letters (a-z)
- \u{2705} **Numbers** (0-9)
- \u{2705} **Special characters** (!@#$%^&*)
- \u{2705} **Unique** password for each site

**Password Managers:** Bitwarden (free), 1Password, LastPass

### \u{1F6E1}\u{FE0F} Two-Factor Authentication (2FA):

2. Receive code on phone (SMS or app)
3. Enter both \u{2192} you're in!
