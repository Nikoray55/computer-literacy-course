— bu siz ko'ra va ushlay oladigan narsalar: monitor, klaviatura, sichqoncha, protsessor (CPU), xotira (RAM), qattiq disk (HDD/SSD).\n\n**Dasturiy ta'minot** — bu qurilmani boshqaradigan va vazifalarni bajaradigan dasturlar: Windows, Microsoft Word, Chrome brauzer va boshqalar.",quiz:{question:"Quyidagilardan qaysi biri 'hardware' (apparat)ga kiradi?",options:["Microsoft Word","Monitor va klaviatura","Windows 11","YouTube"],answer:1}},{id:"1-2",title:"Operatsion tizim",duration:"20 daq",content:"Operatsion tizim (OS) — bu kompyuterning asosiy boshqaruv dasturi. U apparat va boshqa dasturlar o'rtasida vositachi bo'lib ishlaydi.\n\n**Mashhur operatsion tizimlar:**\n- 🪟 **Windows** — eng ko'p ishlatiladigan, Microsoft tomonidan ishlab chiqilgan\n- 🍎 **macOS** — Apple kompyuterlari uchun\n- 🐧 **Linux** — ochiq manbali, dasturchilar orasida mashhur\n- 📱 **Android / iOS** — smartfonlar uchun\n\nOperatsion tizim fayllarni boshqaradi, dasturlarni ishga tushiradi va qurilmalar bilan muloqot qiladi.",quiz:{question:"Operatsion tizimning asosiy vazifasi nima?",options:["Video ko'rish","Apparat va dasturlar o'rtasida vositachi bo'lish","Faqat internet ishlatish","Rasmlar chizish"],answer:1}},{id:"1-3",title:"Fayl va papkalar boshqaruvi",duration:"25 daq",content:"Fayllar — bu kompyuterdagi ma'lumotlar birligi. Har bir faylning **kengaytmasi** bo'lib, u fayl turini ko'rsatadi:\n\n- `.docx` — Word hujjati\n- `.pdf` — PDF fayl\n- `.jpg`, `.png` — rasmlar\n- `.mp4` — video\n- `.exe` — dastur\n\n**Papkalar** (folder) — fayllarni tartibli saqlash uchun ishlatiladi. Ularni xona ichidagi shkaf deb tasavvur qiling.\n\n**Foydali buyruqlar:**\n- Nusxa ko'chirish: `Ctrl + C`\n- Joylashtirish: `Ctrl + V`\n- Kesib olish: `Ctrl + X`\n- Bekor qilish: `Ctrl + Z`",quiz:{question:"'.pdf' kengaytmali fayl qanday turdagi fayl?",options:["Rasm fayli","Video fayli","PDF hujjati","Musiqa fayli"],answer:2}}]},{id:2,title:"Internet va xavfsizlik",icon:"🌐",color:"#059669",lessons:[{id:"2-1",title:"Internet qanday ishlaydi?",duration:"20 daq",content:"Internet — bu dunyo bo'ylab millionlab kompyuterlarni bog'laydigan global tarmoq. \n\n**Asosiy tushunchalar:**\n- **IP manzil** — har bir qurilmaning tarmoqdagi noyob manzili (masalan: 192.168.1.1)\n- **DNS** — domen nomlarini IP manzillarga aylantiruvchi tizim (google.com → 142.250.74.46)\n- **Brauzer** — internetdagi saytlarni ko'rsatuvchi dastur (Chrome, Firefox, Edge)\n- **URL** — sayt manzili (https://www.example.com)\n\n**HTTP vs HTTPS:**\nHTTPS xavfsiz — ma'lumotlar shifrlangan. Sayt manzilida 🔒 belgisi bo'lsa xavfsiz.",quiz:{question:"HTTPS nima uchun muhim?",options:["Sahifani tezroq yuklaydi","Ma'lumotlarni shifrlaydi va xavfsizlikni ta'minlaydi","Ko'proq reklama ko'rsatadi","Faqat video uchun"],answer:1}},{id:"2-2",title:"Kiberhavfsizlik asoslari",duration:"30 daq",content:"Internetda xavfsiz bo'lish uchun bir nechta muhim qoidalar:\n\n**Kuchli parol yaratish:**\n- Kamida 12 ta belgi\n- Katta va kichik harflar, raqamlar, belgilar (`@`, `#`, `!`)\n- Har bir sayt uchun alohida parol\n- Misol: `MyDog@2024!Bark` — kuchli parol\n\n**Fishing (Phishing) hujumlaridan saqlaning:**\nFishing — bu soxta sayt yoki xat orqali ma'lumotlaringizni o'g'irlashga urinish. Belgilari:\n- Noma'lum jo'natuvchidan xat\n- Shoshiltirilish ('24 soat ichida tasdiqlang!')\n- Noto'g'ri yozilgan manzil (g00gle.com)\n\n**Ikki bosqichli tasdiqlash (2FA)** — eng ishonchli himoya!",quiz:{question:"Kuchli parolda nima bo'lishi shart?",options:["Faqat raqamlar","Tug'ilgan kun","Katta-kichik harf, raqam va belgilar","Ismingiz"],answer:2}},{id:"2-3",title:"Ijtimoiy tarmoqlar va raqamli odobi",duration:"20 daq",content:"Ijtimoiy tarmoqlarda xavfsiz va mas'uliyatli bo'lish:\n\n**Nima ulashmang:**\n- Uy manzilingiz yoki telefon raqamingiz\n- Moliyaviy ma'lumotlar\n- Pasport yoki hujjat rasmlari\n- Boshqalar haqida ruxsatsiz ma'lumot\n\n**Raqamli odobli xulq:**\n- Boshqalarni hurmat qiling\n- Yolg'on ma'lumot tarqatmang\n- Noto'g'ri kontent ko'rsangiz xabar bering\n- Mualliflik huquqini hurmat qiling\n\n**Ekran vaqtini boshqaring** — kompyuter va telefon oldida haddan ko'p vaqt o'tkazish sog'liqqa zarar.",quiz:{question:"Ijtimoiy tarmoqlarda nima ulashish xavfli?",options:["Sevimli film","Uy manzili va shaxsiy hujjatlar","Qiziqarli maqola","Tabiat rasmlari"],answer:1}}]},{id:3,title:"Ofis dasturlari",icon:"📝",color:"#7c3aed",lessons:[{id:"3-1",title:"Microsoft Word asoslari",duration:"35 daq",content:"Microsoft Word — eng mashhur matn muharriri. Asosiy xususiyatlari:\n\n**Matn formatlash:**\n- **Qalin** (`Ctrl + B`), *Kursiv* (`Ctrl + I`), Tagiga chizilgan (`Ctrl + U`)\n- Shrift o'lchami va turi\n- Paragraf hizalanishi\n\n**Asosiy buyruqlar:**\n- Yangi hujjat: `Ctrl + N`\n- Ochish: `Ctrl + O`\n- Saqlash: `Ctrl + S`\n- Chop etish: `Ctrl + P`\n- Hammasini belgilash: `Ctrl + A`\n- Izlash: `Ctrl + F`\n\n**Jadvalli hujjatlar** — Insert → Table orqali jadval qo'shish mumkin. Sarlavha, mundarija va sahifa raqamlari ham qo'shish oson.",quiz:{question:"Wordda hujjatni saqlash uchun qaysi tugmani bosamiz?",options:["Ctrl + P","Ctrl + C","Ctrl + S","Ctrl + Z"],answer:2}},{id:"3-2",title:"Microsoft Excel asoslari",duration:"40 daq",content:"Excel — elektron jadval dasturi. Hisob-kitoblar, ma'lumotlar tahlili uchun ideal.\n\n**Asosiy tushunchalar:**\n- **Katakcha (Cell)** — ma'lumot kiritish joyi (A1, B2, C3...)\n- **Qator (Row)** — gorizontal qatorlar (1, 2, 3...)\n- **Ustun (Column)** — vertikal ustunlar (A, B, C...)\n\n**Eng muhim formulalar:**\n```\n=SUM(A1:A10)    — yig'indi\n=AVERAGE(A1:A10) — o'rtacha\n=MAX(A1:A10)    — eng katta\n=MIN(A1:A10)    — eng kichik\n=COUNT(A1:A10)  — sonlar soni\n```\n\n**Diagrammalar** — ma'lumotlarni grafik ko'rinishda ko'rsatish uchun Insert → Chart.",quiz:{question:"Excelda qator summasini hisoblash formulasi qaysi?",options:["=TOTAL(A1:A10)","=SUM(A1:A10)","=ADD(A1:A10)","=PLUS(A1:A10)"],answer:1}},{id:"3-3",title:"Elektron pochta (Email)",duration:"25 daq",content:"Elektron pochta — rasmiy va norasmiy muloqotning eng muhim vositasi.\n\n**Email manzil tuzilishi:**\n`ism.familiya@gmail.com`\n- `ism.familiya` — foydalanuvchi nomi\n- `@` — 'at' belgisi\n- `gmail.com` — pochta xizmati\n\n**Professional email yozish:**\n1. **Mavzu** — aniq va qisqa\n2. **Salom** — 'Hurmatli ...' yoki 'Salom ...'\n3. **Asosiy qism** — aniq va ixcham\n4. **Xotima** — 'Hurmat bilan, [Ism]'\n\n**Ilova (Attachment)** — fayl qo'shish mumkin, lekin 25 MB dan oshmasin.\n\n**Spam papkasi** — noma'lum manzillardan kelgan xatlar ko'pincha shu yerga tushadi.",quiz:{question:"Professional emailda birinchi nima yoziladi?",options:["Asosiy gap","Xotima","Mavzu (Subject)","Ilova"],answer:2}}]},{id:4,title:"Dasturlashga kirish",icon:"💻",color:"#dc2626",lessons:[{id:"4-1",title:"Dasturlash nima?",duration:"20 daq",content:"Dasturlash — bu kompyuterga ko'rsatma berish san'ati. Xuddi pishirish retsepti kabi: aniq qadamlar ketma-ketligi.\n\n**Dasturlash tillari:**\n- 🐍 **Python** — o'rganish oson, sun'iy intellekt uchun mashhur\n- ☕ **Java** — keng tarqalgan, Android ilovalar\n- 🌐 **JavaScript** — veb saytlar uchun\n- ⚡ **C++** — tez ishlashi kerak bo'lgan dasturlar\n\n**Dasturlashning asosiy tushunchalari:**\n- **O'zgaruvchi** — ma'lumot saqlash uchun (masalan: `ism = 'Ali'`)\n- **Shart operatori** — 'Agar ... bo'lsa ...' (`if/else`)\n- **Takrorlash** — bir ishni ko'p marta bajarish (`for`, `while`)\n- **Funksiya** — qayta ishlatiladigan kod bloki",quiz:{question:"Python dasturlash tili asosan nima uchun mashhur?",options:["Video o'yinlar uchun","Sun'iy intellekt va o'rganish osonligi","Faqat veb saytlar uchun","Faqat mobil ilovalar uchun"],answer:1}},{id:"4-2",title:"Algoritmik fikrlash",duration:"25 daq",content:"Algoritm — muammoni hal qilish uchun aniq qadamlar ketma-ketligi.\n\n**Kundalik hayotdan misol — Choy tayyorlash algoritmi:**\n1. Choynak ichiga suv quy\n2. Suv qaynashini kut\n3. Choy xaltasini sol\n4. 3-5 daqiqa kut\n5. Choy xaltasini olib tashla\n6. Istaganingizcha qand qo'sh\n7. Iching!\n\n**Algoritmik fikrlashning 4 bosqichi:**\n1. **Muammoni tush** — nima hal qilish kerak?\n2. **Parchalash** — kichik qismlarga bo'lish\n3. **Naqshlarni top** — o'xshash muammolar bormi?\n4. **Abstraktsiya** — keraksizlarni olib tashlash\n\nHar bir dastur aslida algoritmdir!",quiz:{question:"Algoritm nima?",options:["Dasturlash tili","Muammoni hal qilish uchun aniq qadamlar ketma-ketligi","Kompyuter qismi","Operatsion tizim"],answer:1}},{id:"4-3",title:"Keyingi qadam: Java yoki Python",duration:"15 daq",content:"Tabriklaymiz! Siz kompyuter savodxonligi kursini yakunladingiz! 🎉\n\n**Endi sizda dasturlashni o'rganishga tayyor zamin bor.**\n\n**Python bilan boshlash tavsiya etiladi chunki:**\n- Sintaksis (yozilish tarzi) ingliz tiliga o'xshash va tushunarli\n- Xatolar kamroq\n- Katta hamjamiyat va ko'p resurslar\n- Sun'iy intellekt, ma'lumotlar tahlili uchun ideal\n\n**Java o'rganish afzalligi:**\n- Kuchli va tez\n- Android dasturlash uchun asosiy til\n- Korporativ muhitda keng qo'llaniladi\n- Ob'ektga yo'naltirilgan dasturlashni yaxshi o'rgatadi\n\n**Tavsiya:** Avval Python, keyin Java yo'li eng samarali yondashuv! Keyingi kursimizda ko'rishguncha! 🚀",quiz:{question:"Dasturlashni boshlash uchun qaysi til eng qulay hisoblanadi?",options:["C++","Assembly","Python","JavaScript"],answer:2}}]}];function nQ({onHome:e}){return(0,c.jsx)("header",{className:"header",children:(0,c.jsxs)("div",{className:"header-inner",children:[(0,c.jsxs)("button",{onClick:e,className:"logo-btn",children:[(0,c.jsx)("span",{className:"logo-icon",children:"💡"}),(0,c.jsxs)("span",{className:"logo-text",children:["TechStart ",(0,c.jsx)("span",{className:"logo-sub",children:"Academy"})]})]}),(0,c.jsx)("div",{className:"header-badge",children:(0,c.jsx)(eF,{variant:"secondary",children:"Bepul kurs"})})]})})}function nW({completedLessons:e,onSelectModule:t}){let n=nV.reduce((e,t)=>e+t.lessons.length,0),r=e.size,a=Math.round(r/n*100);return(0,c.jsxs)("div",{className:"home-page",children:[
