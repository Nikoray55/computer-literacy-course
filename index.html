i asosiy qismdan iborat:\n\n### 🔧 Hardware (Apparat)\nSiz ko'ra va ushlay oladigan fizik qismlar:\n- **Protsessor (CPU)** — kompyuterning \"miyasi\", barcha hisob-kitoblarni bajaradi\n- **Xotira (RAM)** — vaqtinchalik ma'lumotlarni saqlaydi (8-32 GB)\n- **Qattiq disk (SSD/HDD)** — doimiy ma'lumotlarni saqlaydi (256 GB - 2 TB)\n- **Monitor** — ma'lumotlarni ko'rsatadi\n- **Klaviatura va sichqoncha** — ma'lumot kiritish qurilmalari\n- **Videokarta (GPU)** — grafik ma'lumotlarni qayta ishlaydi\n\n### 💻 Software (Dasturiy ta'minot)\nKompyuterni boshqaradigan dasturlar:\n- **Operatsion tizim** — Windows, macOS, Linux\n- **Ilovalar** — Word, Chrome, Photoshop\n- **Drayverlar** — qurilmalarni boshqarish dasturlari\n\n### 💡 Asosiy farq\nHardware = fizik qurilmalar | Software = dasturlar",ru:'## Что такое компьютер?\n\nКомпьютер — электронное устройство для обработки данных. Он состоит из двух основных частей:\n\n### 🔧 Аппаратное обеспечение (Hardware)\nФизические компоненты, которые можно увидеть и потрогать:\n- **Процессор (CPU)** — "мозг" компьютера, выполняет все вычисления\n- **Оперативная память (RAM)** — временное хранилище данных (8-32 ГБ)\n- **Жёсткий диск (SSD/HDD)** — постоянное хранилище данных\n- **Монитор** — отображает информацию\n- **Клавиатура и мышь** — устройства ввода\n\n### 💻 Программное обеспечение (Software)\nПрограммы, управляющие компьютером:\n- **Операционная система** — Windows, macOS, Linux\n- **Приложения** — Word, Chrome, Photoshop\n- **Драйверы** — программы управления устройствами',en:'## What is a Computer?\n\nA computer is an electronic device that processes data. It consists of two main parts:\n\n### 🔧 Hardware\nPhysical components you can see and touch:\n- **CPU (Processor)** — the "brain" of the computer\n- **RAM (Memory)** — temporary data storage (8-32 GB)\n- **SSD/HDD (Storage)** — permanent data storage\n- **Monitor** — displays information\n- **Keyboard & Mouse** — input devices\n- **GPU (Graphics Card)** — processes visual data\n\n### 💻 Software\nPrograms that control the computer:\n- **Operating System** — Windows, macOS, Linux\n- **Applications** — Word, Chrome, Photoshop\n- **Drivers** — device management programs'},quiz:{question:{uz:"Protsessor (CPU) qanday vazifa bajaradi?",ru:"Какую функцию выполняет процессор (CPU)?",en:"What does the CPU (Processor) do?"},options:{uz:["Rasmlarni saqlaydi","Barcha hisob-kitoblarni bajaradi","Internetga ulanadi","Ovoz chiqaradi"],ru:["Хранит изображения","Выполняет все вычисления","Подключается к интернету","Воспроизводит звук"],en:["Stores images","Performs all calculations","Connects to internet","Plays sound"]},answer:1}},{id:"hw-2",xp:50,duration:20,type:"reading",title:{uz:"Operatsion tizimlar",ru:"Операционные системы",en:"Operating Systems"},content:{uz:"## Operatsion tizimlar\n\nOperatsion tizim (OS) — bu kompyuterning asosiy boshqaruv dasturi.\n\n### Mashhur operatsion tizimlar:\n\n**🪟 Windows**\n- Microsoft tomonidan ishlab chiqilgan\n- Eng keng tarqalgan (80%+ bozor ulushi)\n- Biznes va o'yinlar uchun ideal\n- Versiyalar: Windows 10, Windows 11\n\n**🍎 macOS**\n- Apple tomonidan, faqat Mac kompyuterlar uchun\n- Dizayn va ijodkorlik uchun afzal\n- Xavfsizligi yuqori\n\n**🐧 Linux**\n- Ochiq manbali va bepul\n- Dasturchilar va serverlar uchun\n- Turli xil distributivlar: Ubuntu, Fedora, Debian\n\n**📱 Mobil OT**\n- Android (Google) — smartfonlarning 72%\n- iOS (Apple) — iPhone uchun\n\n### OS ning asosiy vazifalari:\n1. Fayllarni boshqarish\n2. Dasturlarni ishga tushirish\n3. Qurilmalar bilan muloqot\n4. Foydalanuvchi interfeysini ta'minlash\n5. Xavfsizlikni ta'minlash",ru:"## Операционные системы\n\nОперационная система (ОС) — основная управляющая программа компьютера.\n\n### Популярные операционные системы:\n\n**🪟 Windows** — от Microsoft, самая распространённая\n**🍎 macOS** — от Apple, только для Mac\n**🐧 Linux** — открытый исходный код, для разработчиков\n**📱 Android/iOS** — для мобильных устройств",en:"## Operating Systems\n\nAn Operating System (OS) is the main control program of a computer.\n\n### Popular Operating Systems:\n\n**🪟 Windows** — by Microsoft, most widely used (80%+ market share)\n**🍎 macOS** — by Apple, only for Mac computers\n**🐧 Linux** — open source, free, for developers and servers\n**📱 Android/iOS** — for mobile devices\n\n### Main OS Functions:\n1. File management\n2. Running programs\n3. Device communication\n4. User interface\n5. Security"},quiz:{question:{uz:"Linux operatsion tizimi qanday tarqatiladi?",ru:"Как распространяется Linux?",en:"How is Linux distributed?"},options:{uz:["Pullik litsenziya bilan","Ochiq manbali va bepul","Faqat Apple uchun","Faqat telefonlar uchun"],ru:["По платной лицензии","Открытый исходный код, бесплатно","Только для Apple","Только для телефонов"],en:["Paid license","Open source and free","Only for Apple","Only for phones"]},answer:1}},{id:"hw-3",xp:75,duration:25,type:"reading",title:{uz:"Fayl va Papkalar",ru:"Файлы и папки",en:"Files & Folders"},content:{uz:"## Fayl va Papkalar boshqaruvi\n\n### Fayl kengaytmalari:\n| Kengaytma | Tur | Misol |\n|-----------|-----|-------|\n| .docx | Word hujjati | report.docx |\n| .xlsx | Excel jadval | budget.xlsx |\n| .pdf | PDF fayl | manual.pdf |\n| .jpg .png | Rasm | photo.jpg |\n| .mp4 .avi | Video | movie.mp4 |\n| .mp3 .wav | Audio | song.mp3 |\n| .exe | Dastur | setup.exe |\n| .zip .rar | Arxiv | files.zip |\n\n### Muhim klaviatura yorliqlari:\n- `Ctrl + C` — Nusxa ko'chirish\n- `Ctrl + V` — Joylashtirish\n- `Ctrl + X` — Kesib olish\n- `Ctrl + Z` — Bekor qilish\n- `Ctrl + A` — Hammasini tanlash\n- `Delete` — O'chirish\n- `F2` — Nomini o'zgartirish\n\n### Fayl tizimi tuzilmasi:\n```\nC:\\\n├── Windows/\n├── Program Files/\n├── Users/\n│   └── YourName/\n│       ├── Desktop/\n│       ├── Documents/\n│       ├── Downloads/\n│       └── Pictures/\n```",ru:"## Управление файлами и папками\n\n### Расширения файлов:\n- .docx — документ Word\n- .xlsx — таблица Excel\n- .pdf — PDF файл\n- .jpg/.png — изображения\n- .mp4 — видео\n- .exe — программа\n\n### Горячие клавиши:\n- Ctrl+C — Копировать\n- Ctrl+V — Вставить\n- Ctrl+X — Вырезать\n- Ctrl+Z — Отменить",en:"## File & Folder Management\n\n### File Extensions:\n| Extension | Type | Example |\n|-----------|------|---------|\n| .docx | Word document | report.docx |\n| .xlsx | Excel spreadsheet | budget.xlsx |\n| .pdf | PDF file | manual.pdf |\n| .jpg .png | Image | photo.jpg |\n| .mp4 | Video | movie.mp4 |\n| .exe | Program | setup.exe |\n\n### Keyboard Shortcuts:\n- `Ctrl + C` — Copy\n- `Ctrl + V` — Paste\n- `Ctrl + X` — Cut\n- `Ctrl + Z` — Undo\n- `Ctrl + A` — Select All\n- `F2` — Rename"},quiz:{question:{uz:".xlsx kengaytmali fayl qaysi dasturda ochiladi?",ru:"В какой программе открывается файл .xlsx?",en:"Which program opens .xlsx files?"},options:{uz:["Microsoft Word","Microsoft Excel","Adobe Photoshop","VLC Player"],ru:["Microsoft Word","Microsoft Excel","Adobe Photoshop","VLC Player"],en:["Microsoft Word","Microsoft Excel","Adobe Photoshop","VLC Player"]},answer:1}}]},{id:"internet",icon:"🌐",color:"#0891b2",title:{uz:"Internet va Xavfsizlik",ru:"Интернет и безопасность",en:"Internet & Security"},description:{uz:"Internet, brauzer va kiberxavfsizlik asoslari",ru:"Основы интернета и кибербезопасности",en:"Internet, browser and cybersecurity basics"},lessons:[{id:"net-1",xp:60,duration:20,type:"video",title:{uz:"Internet qanday ishlaydi?",ru:"Как работает интернет?",en:"How does the Internet work?"},content:{uz:"## Internet qanday ishlaydi?\n\n### Asosiy tushunchalar:\n\n**IP Manzil** — har bir qurilmaning tarmoqdagi noyob manzili\n- IPv4: `192.168.1.1`\n- IPv6: `2001:0db8:85a3::8a2e:0370:7334`\n\n**DNS (Domain Name System)** — domen nomlarini IP manzillarga aylantiradi\n- `google.com` → `142.250.74.46`\n\n**HTTP va HTTPS**\n- HTTP — oddiy, xavfsiz emas\n- HTTPS — shifrlangan, xavfsiz (🔒 belgisi)\n\n**Brauzerlar:**\n- Google Chrome (65% bozor)\n- Mozilla Firefox\n- Microsoft Edge\n- Safari (Apple)\n\n### URL tuzilmasi:\n```\nhttps://www.example.com/page?query=value\n  │        │       │      │\n  │        │       │      └── Parametrlar  \n  │        │       └───────── Yo'l\n  │        └───────────────── Domen\n  └────────────────────────── Protokol\n```\n\n### Tarmoq turlari:\n- **LAN** — mahalliy tarmoq (uy, ofis)\n- **WAN** — keng maydonli tarmoq (internet)\n- **WiFi** — simsiz tarmoq\n- **5G** — mobil tarmoq",ru:"## Как работает интернет?\n\n### Основные понятия:\n\n**IP-адрес** — уникальный адрес устройства в сети\n**DNS** — преобразует доменные имена в IP-адреса\n**HTTPS** — зашифрованное, безопасное соединение (🔒)\n\n### Структура URL:\n```\nhttps://www.example.com/page\n  │        │       │\n  │        │       └── Путь\n  │        └────────── Домен\n  └─────────────────── Протокол\n```",en:"## How does the Internet work?\n\n### Key Concepts:\n\n**IP Address** — unique address of a device on the network\n- IPv4: `192.168.1.1`\n\n**DNS** — converts domain names to IP addresses\n- `google.com` → `142.250.74.46`\n\n**HTTP vs HTTPS**\n- HTTP — unencrypted, not secure\n- HTTPS — encrypted, secure (🔒 icon)\n\n### URL Structure:\n```\nhttps://www.example.com/page?q=value\n  │        │       │     │\n  │        │       │     └── Parameters\n  │        │       └──────── Path\n  │        └──────────────── Domain\n  └───────────────────────── Protocol\n```"},quiz:{question:{uz:"HTTPS va HTTP orasidagi asosiy farq nima?",ru:"В чём основное отличие HTTPS от HTTP?",en:"What is the main difference between HTTPS and HTTP?"},options:{uz:["HTTPS tezroq","HTTPS ma'lumotlarni shifrlaydi","HTTP xavfsizroq","Farq yo'q"],ru:["HTTPS быстрее","HTTPS шифрует данные","HTTP безопаснее","Нет разницы"],en:["HTTPS is faster","HTTPS encrypts data","HTTP is more secure","No difference"]},answer:1}},{id:"net-2",xp:80,duration:30,type:"reading",title:{uz:"Kiberxavfsizlik",ru:"Кибербезопасность",en:"Cybersecurity"},content:{uz:"## Kiberxavfsizlik asoslari\n\n### 🔐 Kuchli parol yaratish:\n**Zaif parollar:** `123456`, `password`, `qwerty`\n**Kuchli parol:** `MyD0g@H0me!2024`\n\n**Qoidalar:**\n- Kamida 12 ta belgi\n- Katta + kichik harflar\n- Raqamlar\n- Maxsus belgilar (!@#$%)\n- Har bir sayt uchun alohida parol\n\n### 🎣 Fishing (Phishing) hujumlari:\nSoxta sayt yoki xat orqali ma'lumot o'g'irlash.\n\n**Belgilari:**\n- Noma'lum jo'natuvchi\n- Shoshiltirilish (\"24 soat ichida!\")\n- Noto'g'ri manzil (`g00gle.com`)\n- Shaxsiy ma'lumot so'rash\n\n### 🛡️ Himoya usullari:\n1. **Ikki bosqichli tasdiqlash (2FA)** — eng muhim!\n2. **Antivirus dasturi** — Windows Defender, Kaspersky\n3. **VPN** — internetni shifrlash\n4. **Yangilanishlar** — OS va dasturlarni yangilab turing\n5. **Ehtiyot bo'ling** — noma'lum havolalarni bosmang\n\n### 📱 Ijtimoiy muhandislik:\nOdamlarni aldash orqali ma'lumot olish.\nHech kim parolingizni so'ramaydi!",ru:'## Основы кибербезопасности\n\n### 🔐 Создание надёжного пароля:\n- Минимум 12 символов\n- Заглавные + строчные буквы\n- Цифры и специальные символы\n- Отдельный пароль для каждого сайта\n\n### 🎣 Фишинг:\nКража данных через поддельные сайты.\n\n**Признаки:**\n- Неизвестный отправитель\n- Срочность ("Подтвердите за 24 часа!")\n- Неправильный адрес (`g00gle.com`)\n\n### 🛡️ Защита:\n1. Двухфакторная аутентификация (2FA)\n2. Антивирус\n3. Регулярные обновления',en:'## Cybersecurity Basics\n\n### 🔐 Strong Password Creation:\n**Weak:** `123456`, `password`, `qwerty`\n**Strong:** `MyD0g@H0me!2024`\n\n**Rules:**\n- At least 12 characters\n- Upper + lowercase letters\n- Numbers\n- Special characters (!@#$%)\n- Unique password per site\n\n### 🎣 Phishing Attacks:\nStealing data through fake websites/emails.\n\n**Signs:**\n- Unknown sender\n- Urgency ("Act within 24 hours!")\n- Wrong address (`g00gle.com`)\n\n### 🛡️ Protection Methods:\n1. **Two-Factor Authentication (2FA)** — most important!\n2. **Antivirus** — Windows Defender, Kaspersky\n3. **VPN** — encrypt your internet\n4. **Updates** — keep OS and apps updated'},quiz:{question:{uz:"Ikki bosqichli tasdiqlash (2FA) nima?",ru:"Что такое двухфакторная аутентификация (2FA)?",en:"What is Two-Factor Authentication (2FA)?"},options:{uz:["Ikki xil parol ishlatish","Paroldan tashqari qo'shimcha tasdiqlash","Ikki kompyuter ishlatish","Ikki brauzer ochish"],ru:["Использование двух паролей","Дополнительное подтверждение помимо пароля","Использование двух компьютеров","Открытие двух браузеров"],en:["Using two passwords","Additional verification beyond password","Using two computers","Opening two browsers"]},answer:1}}]},{id:"office",icon:"📝",color:"#7c3aed",title:{uz:"Ofis Dasturlari",ru:"Офисные программы",en:"Office Applications"},description:{uz:"Word, Excel, PowerPoint va Email",ru:"Word, Excel, PowerPoint и Email",en:"Word, Excel, PowerPoint and Email"},lessons:[{id:"office-1",xp:70,duration:35,type:"interactive",title:{uz:"Microsoft Word",ru:"Microsoft Word",en:"Microsoft Word"},content:{uz:"## Microsoft Word — Matn muharriri\n\n### Asosiy vositalar paneli:\n\n**Matn formatlash:**\n- **Qalin** `Ctrl+B` | *Kursiv* `Ctrl+I` | Tagiga chizilgan `Ctrl+U`\n- Shrift: Times New Roman, Arial, Calibri\n- O'lcham: 12pt (standart), 14pt (sarlavha)\n\n**Hizalash:**\n- Chapga `Ctrl+L`\n- Markazga `Ctrl+E`\n- O'ngga `Ctrl+R`\n- Tekislash `Ctrl+J`\n\n### Muhim buyruqlar:\n| Buyruq | Klaviatura |\n|--------|------------|\n| Yangi hujjat | Ctrl+N |\n| Ochish | Ctrl+O |\n| Saqlash | Ctrl+S |\n| PDF saqlash | Ctrl+Shift+S |\n| Chop etish | Ctrl+P |\n| Topish | Ctrl+F |\n| Almashtirish | Ctrl+H |\n\n### Professional hujjat yaratish:\n1. **Sarlavha** — Heading 1 (Alt+1)\n2. **Kichik sarlavha** — Heading 2 (Alt+2)\n3. **Mundarija** — References → Table of Contents\n4. **Sahifa raqami** — Insert → Page Number\n5. **Jadval** — Insert → Table\n\n### Hujjat formatlari:\n- `.docx` — Word hujjati (tahrirlash mumkin)\n- `.pdf` — nashr uchun (o'zgartirib bo'lmaydi)\n- `.txt` — oddiy matn",ru:"## Microsoft Word — Текстовый редактор\n\n### Основные инструменты:\n\n**Форматирование текста:**\n- **Жирный** Ctrl+B | *Курсив* Ctrl+I | Подчёркнутый Ctrl+U\n\n### Горячие клавиши:\n| Команда | Клавиши |\n|---------|----------|\n| Новый документ | Ctrl+N |\n| Открыть | Ctrl+O |\n| Сохранить | Ctrl+S |\n| Печать | Ctrl+P |\n| Найти | Ctrl+F |",en:"## Microsoft Word — Text Editor\n\n### Formatting:\n- **Bold** `Ctrl+B` | *Italic* `Ctrl+I` | Underline `Ctrl+U`\n- Alignment: Left `Ctrl+L` | Center `Ctrl+E` | Right `Ctrl+R`\n\n### Key Shortcuts:\n| Command | Shortcut |\n|---------|----------|\n| New document | Ctrl+N |\n| Open | Ctrl+O |\n| Save | Ctrl+S |\n| Print | Ctrl+P |\n| Find | Ctrl+F |\n| Replace | Ctrl+H |\n\n### Professional Document:\n1. Headings (Heading 1, Heading 2)\n2. Table of Contents\n3. Page Numbers\n4. Tables and Images"},quiz:{question:{uz:'Wordda matnni "Qalin" qilish uchun qaysi tugma kombinatsiyasi ishlatiladi?',ru:"Какое сочетание клавиш делает текст жирным в Word?",en:"Which keyboard shortcut makes text bold in Word?"},options:{uz:["Ctrl+I","Ctrl+B","Ctrl+U","Ctrl+P"],ru:["Ctrl+I","Ctrl+B","Ctrl+U","Ctrl+P"],en:["Ctrl+I","Ctrl+B","Ctrl+U","Ctrl+P"]},answer:1}},{id:"office-2",xp:80,duration:40,type:"interactive",title:{uz:"Microsoft Excel",ru:"Microsoft Excel",en:"Microsoft Excel"},content:{uz:"## Microsoft Excel — Elektron jadvallar\n\n### Asosiy tushunchalar:\n- **Katakcha (Cell)** — A1, B2, C3...\n- **Qator (Row)** — 1, 2, 3...\n- **Ustun (Column)** — A, B, C...\n- **Varaq (Sheet)** — Sheet1, Sheet2...\n\n### Eng muhim formulalar:\n```excel\n=SUM(A1:A10)      ← Yig'indi\n=AVERAGE(A1:A10)  ← O'rtacha\n=MAX(A1:A10)      ← Eng katta\n=MIN(A1:A10)      ← Eng kichik\n=COUNT(A1:A10)    ← Sonlar soni\n=IF(A1>100,\"Ko'p\",\"Oz\")  ← Shart\n=VLOOKUP(...)     ← Qidirish\n```\n\n### Diagrammalar:\n1. Ma'lumotlarni tanlang\n2. Insert → Chart\n3. Tur tanlang: Column, Line, Pie, Bar\n\n### Foydali funksiyalar:\n- **Muzlatish** — View → Freeze Panes\n- **Filtr** — Data → Filter\n- **Tartiblash** — Data → Sort\n- **Shartli formatlash** — Home → Conditional Formatting",ru:'## Microsoft Excel — Электронные таблицы\n\n### Основные понятия:\n- **Ячейка** — A1, B2, C3...\n- **Строка** — 1, 2, 3...\n- **Столбец** — A, B, C...\n\n### Важные формулы:\n```excel\n=SUM(A1:A10)      ← Сумма\n=AVERAGE(A1:A10)  ← Среднее\n=MAX(A1:A10)      ← Максимум\n=MIN(A1:A10)      ← Минимум\n=IF(A1>100,"Много","Мало")\n```',en:'## Microsoft Excel — Spreadsheets\n\n### Key Concepts:\n- **Cell** — A1, B2, C3...\n- **Row** — 1, 2, 3...\n- **Column** — A, B, C...\n\n### Essential Formulas:\n```excel\n=SUM(A1:A10)      ← Sum\n=AVERAGE(A1:A10)  ← Average\n=MAX(A1:A10)      ← Maximum\n=MIN(A1:A10)      ← Minimum\n=COUNT(A1:A10)    ← Count numbers\n=IF(A1>100,"High","Low") ← Condition\n```\n\n### Charts:\n1. Select data\n2. Insert → Chart\n3. Choose type: Column, Line, Pie, Bar'},quiz:{question:{uz:"Excelda A1 dan A10 gacha bo'lgan katakchalar yig'indisini hisoblash formulasi qaysi?",ru:"Какая формула вычисляет сумму ячеек от A1 до A10 в Excel?",en:"Which formula calculates the sum of cells A1 to A10 in Excel?"},options:{uz:["=TOTAL(A1:A10)","=SUM(A1:A10)","=ADD(A1,A10)","=PLUS(A1:A10)"],ru:["=TOTAL(A1:A10)","=SUM(A1:A10)","=ADD(A1,A10)","=PLUS(A1:A10)"],en:["=TOTAL(A1:A10)","=SUM(A1:A10)","=ADD(A1,A10)","=PLUS(A1:A10)"]},answer:1}}]}]},{id:"programming-intro",title:{uz:"Dasturlashga Kirish",ru:"Введение в программирование",en:"Introduction to Programming"},description:{uz:"Algoritmik fikrlash va Python asoslari",ru:"Алгоритмическое мышление и основы Python",en:"Algorithmic thinking and Python basics"},level:"intermediate",color:"#059669",icon:"💻",totalHours:12,modules:[{id:"algo",icon:"🧠",color:"#059669",title:{uz:"Algoritmik Fikrlash",ru:"Алгоритмическое мышление",en:"Algorithmic Thinking"},description:{uz:"Muammolarni algoritmik yechish",ru:"Алгоритмическое решение задач",en:"Solving problems algorithmically"},lessons:[{id:"algo-1",xp:100,duration:25,type:"interactive",title:{uz:"Algoritm nima?",ru:"Что такое алгоритм?",en:"What is an Algorithm?"},content:{uz:"## Algoritm — muammoni hal qilish yo'li\n\n### Ta'rif:\nAlgoritm — muammoni hal qilish uchun aniq, ketma-ket qadamlar to'plami.\n\n### Kundalik hayotdan misollar:\n\n**Choy tayyorlash algoritmi:**\n```\n1. Choynak ichiga suv quy\n2. Pechkaga qo'y\n3. Suv qaynashini kut\n4. Choy soling\n5. 3-5 daqiqa kuting\n6. Piyolaga quyib iching\n```\n\n### Algoritmning xossalari:\n1. **Aniqlik** — har bir qadam tushunarli\n2. **Cheklilik** — tugash kerak\n3. **Umumiylik** — ko'p holat uchun ishlashi\n4. **Natija berish** — chiqish qiymati bo'lishi\n\n### Algoritmik fikrlashning 4 bosqichi:\n1. 🔍 **Parchalash** — kichik qismlarga bo'lish\n2. 🔎 **Naqsh topish** — o'xshashliklarni aniqlash\n3. 🎯 **Abstraktsiya** — keraksizni olib tashlash\n4. 📝 **Algoritm tuzish** — qadam-qadam yechim\n\n### Flowchart (Oqim diagrammasi):\n```\n[Boshlash] → [Suv quy] → [Qaynayaptimi?]\n                              ↓ Ha\n                         [Choy sol] → [Tugash]\n```",ru:"## Алгоритм — путь решения задачи\n\n### Определение:\nАлгоритм — набор чётких последовательных шагов для решения задачи.\n\n### Пример — приготовление чая:\n```\n1. Налить воду в чайник\n2. Поставить на огонь\n3. Дождаться кипения\n4. Добавить чай\n5. Подождать 3-5 минут\n6. Налить в чашку\n```\n\n### 4 этапа алгоритмического мышления:\n1. 🔍 Декомпозиция\n2. 🔎 Поиск паттернов\n3. 🎯 Абстракция\n4. 📝 Составление алгоритма",en:"## Algorithm — The Path to Problem Solving\n\n### Definition:\nAn algorithm is a set of clear, sequential steps to solve a problem.\n\n### Real-life Example — Making Tea:\n```\n1. Pour water into kettle\n2. Place on stove\n3. Wait for boiling\n4. Add tea\n5. Wait 3-5 minutes\n6. Pour into cup and drink\n```\n\n### Algorithm Properties:\n1. **Clarity** — each step is understandable\n2. **Finiteness** — must terminate\n3. **Generality** — works for many cases\n4. **Output** — produces a result\n\n### 4 Steps of Algorithmic Thinking:\n1. 🔍 **Decomposition** — break into parts\n2. 🔎 **Pattern Recognition** — find similarities\n3. 🎯 **Abstraction** — remove unnecessary details\n4. 📝 **Algorithm Design** — step-by-step solution"},quiz:{question:{uz:"Algoritmning qaysi xossasi u albatta tugashi kerakligini bildiradi?",ru:"Какое свойство алгоритма означает, что он должен завершиться?",en:"Which property of an algorithm means it must terminate?"},options:{uz:["Aniqlik","Cheklilik","Umumiylik","Natija berish"],ru:["Чёткость","Конечность","Обобщённость","Результативность"],en:["Clarity","Finiteness","Generality","Output"]},answer:1}}]}]}],e0={uz:["Kompyuter — bu hisoblash va ma'lumotlarni qayta ishlash uchun mo'ljallangan elektron qurilma.","Dasturlash — bu kompyuterga muammolarni hal qilish uchun ko'rsatmalar berish jarayonidir.","Internet — butun dunyoni bog'laydigan global kompyuter tarmoqidir.","Xavfsiz parol yaratish uchun katta va kichik harflar, raqamlar va maxsus belgilardan foydalaning.","Microsoft Excel elektron jadvallar yaratish va ma'lumotlarni tahlil qilish uchun ishlatiladi."],ru:["Компьютер — электронное устройство для вычислений и обработки данных.","Программирование — процесс написания инструкций для компьютера для решения задач.","Интернет — глобальная компьютерная сеть, соединяющая весь мир.","Для создания надёжного пароля используйте заглавные и строчные буквы, цифры и символы.","Microsoft Excel используется для создания электронных таблиц и анализа данных."],en:["A computer is an electronic device designed for computation and data processing.","Programming is the process of giving instructions to a computer to solve problems.","The Internet is a global computer network connecting the entire world.","To create a secure password use uppercase and lowercase letters numbers and special characters.","Microsoft Excel is used for creating spreadsheets and analyzing data efficiently."]};var s=(l("2YQ6R"),l("2YQ6R"),l("2YQ6R"),l("2YQ6R"));l("8yZRv");var e1=["a","button","div","form","h2","h3","img","input","label","li","nav","ol","p","select","span","svg","ul"]
